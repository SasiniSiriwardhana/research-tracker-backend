# ============================================================
# Research Project Tracker - Application Configuration
# ============================================================

# Application Name
spring.application.name=research-tracker

# ============================================================
# SERVER CONFIGURATION
# ============================================================
server.port=8081
server.servlet.context-path=/

# ============================================================
# DATABASE CONFIGURATION (MySQL)
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/research_tracker_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Add your mysql passward
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# ============================================================
# JPA / HIBERNATE CONFIGURATION
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ============================================================
# JWT CONFIGURATION
# ============================================================
# Secret key for JWT signing (Base64-encoded 512-bit key)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# ============================================================
# LOGGING
# ============================================================
logging.level.lk.ijse.cmjd=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# ============================================================
# JACKSON (JSON) CONFIGURATION
# ============================================================
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.time-zone=UTC
